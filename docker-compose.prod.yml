services:
  postgres:
    image: postgres:17
    container_name: auction-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: karthikselvam
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auction_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: auction-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

  api:
    image: ghcr.io/karthikashutosh/auction-api:latest

    container_name: auction-api
    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    env_file:
      - ./apps/api/.env.production

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379

    ports:
      - "3001:3001"

  worker:
    image: ghcr.io/karthikashutosh/auction-worker:latest

    container_name: auction-worker
    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    env_file:
      - ./apps/api/.env.production

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379

  web:
    image: ghcr.io/karthikashutosh/auction-web:latest

    container_name: auction-web
    restart: unless-stopped

    depends_on:
      - api

    ports:
      - "3000:3000"

volumes:
  postgres_data:
